<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OPS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   RESET + ROOT
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}

:root{
  /* ── Chardchakaj: Monochrome ── */
  --cc-bg:#FAFAFA;
  --cc-ink:#0A0A0A;
  --cc-mid:#4A4A4A;
  --cc-soft:#F0F0F0;
  --cc-line:#E0E0E0;
  --cc-acc:#0A0A0A;

  /* ── Boonta Gallery: Forest + Gold ── */
  --bg-bg:#F4F7F4;
  --bg-ink:#1A3328;
  --bg-mid:#2D6A4F;
  --bg-soft:#E8F3EC;
  --bg-line:#C8DDD0;
  --bg-gold:#B8860B;
  --bg-gold2:#D4A017;
  --bg-goldf:#FDF8EC;
  --bg-acc:#B8860B;

  /* ── Truly: Punk Pink + Acid Yellow ── */
  --tr-bg:#FFFDE7;
  --tr-ink:#1A1A1A;
  --tr-mid:#C2185B;
  --tr-soft:#FCE4EC;
  --tr-line:#F48FB1;
  --tr-neon:#FFD600;
  --tr-pink:#E91E8C;
  --tr-acc:#E91E8C;

  /* ── System Globals ── */
  --g-red:#FF3B30;
  --g-green:#34C759;
  --g-orange:#FF9500;
  --g-blue:#007AFF;
  --font-sans:'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-serif:'Playfair Display',serif;
}

/* ══════════════════════════════════════
   THEME SWITCH CORES
══════════════════════════════════════ */
body.cc{--a-bg:var(--cc-bg);--a-ink:var(--cc-ink);--a-mid:var(--cc-mid);--a-soft:var(--cc-soft);--a-line:var(--cc-line);--a-acc:var(--cc-acc);font-family:var(--font-sans)}
body.bg{--a-bg:var(--bg-bg);--a-ink:var(--bg-ink);--a-mid:var(--bg-mid);--a-soft:var(--bg-soft);--a-line:var(--bg-line);--a-acc:var(--bg-acc);font-family:var(--font-sans)}
body.tr{--a-bg:var(--tr-bg);--a-ink:var(--tr-ink);--a-mid:var(--tr-mid);--a-soft:var(--tr-soft);--a-line:var(--tr-line);--a-acc:var(--tr-acc);font-family:var(--font-sans)}
body.all{--a-bg:#F2F2F7;--a-ink:#1C1C1E;--a-mid:#8E8E93;--a-soft:#FFFFFF;--a-line:#E5E5EA;--a-acc:#007AFF;font-family:var(--font-sans)}

body{background:var(--a-bg);color:var(--a-ink);transition:background .4s cubic-bezier(.16,1,.3,1),color .4s cubic-bezier(.16,1,.3,1)}

/* ══════════════════════════════════════
   APP SHELL LAYOUT
══════════════════════════════════════ */
.app-container{max-width:480px;margin:0 auto;height:100%;background:var(--a-bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.03);display:flex;flex-direction:column}

/* Top Sticky Bar */
.top-nav{padding:18px 20px 14px;background:var(--a-bg);border-bottom:1px solid var(--a-line);z-index:100;position:relative;flex-shrink:0}
.nav-row{display:flex;justify-content:space-between;align-items:flex-end}
.nav-left-meta{display:flex;flex-direction:column}
.eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:2px}
.title-main{font-size:24px;font-weight:700;letter-spacing:-.5px}
body.bg .title-main{font-family:var(--font-serif);font-weight:700;font-style:italic}
body.tr .title-main{text-transform:uppercase;font-style:italic;font-weight:900;letter-spacing:0}

/* Brand Filter Track */
.brand-strip{display:flex;gap:6px;margin-top:14px;overflow-x:auto;padding-bottom:2px}
.brand-strip::-webkit-scrollbar{display:none}
.ent-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid var(--a-line);background:var(--a-soft);color:var(--a-ink);cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);white-space:nowrap}
.ent-btn.active{background:var(--a-ink);color:var(--a-bg);border-color:var(--a-ink)}

/* Scroll Content Box */
.scroll-viewport{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:100px}

/* Bottom Tab Bar */
.bottom-tabs{position:absolute;bottom:0;left:0;right:0;height:68px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--a-line);display:flex;justify-content:space-around;align-items:center;padding-bottom:12px;z-index:100}
body.cc .bottom-tabs{background:rgba(250,250,250,.9)}
body.bg .bottom-tabs{background:rgba(244,247,244,.9)}
body.tr .bottom-tabs{background:rgba(255,253,231,.9)}

.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--a-ink);opacity:.4;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);width:60px}
.tab-item.active{opacity:1;color:var(--a-acc)}
.tab-icon{font-size:18px}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.2px}

/* ══════════════════════════════════════
   PAGES SYSTEM
══════════════════════════════════════ */
.page{display:none;padding:20px;animation:pageIn .4s cubic-bezier(.16,1,.3,1) forwards}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Section Headers */
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:10px}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--a-mid);font-family:var(--font-mono)}

/* ══════════════════════════════════════
   PAGE 1: BOSS EXECUTIVE SUMMARY
══════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;height:95px}
.stat-n{font-size:32px;font-weight:700;line-height:1;font-family:var(--font-mono)}
.stat-l{font-size:12px;font-weight:500;opacity:.6}
.sn-blue{color:var(--g-blue)}
.sn-green{color:var(--g-green)}
.sn-orange{color:var(--g-orange)}
.sn-red{color:var(--g-red)}

.alert-strip{background:var(--tr-soft);border:1px solid var(--tr-line);border-radius:12px;padding:14px;display:flex;gap:12px;margin-bottom:24px;align-items:flex-start}
body.cc .alert-strip{background:#FFF5F5;border-color:#FEB2B2}
body.bg .alert-strip{background:var(--bg-soft);border-color:var(--bg-line)}
.alert-title{font-size:13px;font-weight:700;color:var(--g-red);margin-bottom:4px}
.alert-body{font-size:12px;line-height:1.5;opacity:.8}

/* ══════════════════════════════════════
   PAGE 2: LIVE TASKS LIST
══════════════════════════════════════ */
.task-row{background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:transform .2s ease}
.task-row:active{transform:scale(.98)}
.task-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.task-main{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.task-sub{font-size:11px;opacity:.5;margin-top:2px}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.task-due{font-family:var(--font-mono);font-size:11px;font-weight:500;opacity:.6}
.task-due.over{color:var(--g-red);font-weight:700}

/* Status Badges */
.sbadge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.sb-todo{background:#E5E5EA;color:#8E8E93}
.sb-doing{background:#FFE5CC;color:var(--g-orange)}
.sb-done{background:#E6F9ED;color:var(--g-green)}
.sb-stuck{background:#FFE6E6;color:var(--g-red)}

/* ══════════════════════════════════════
   PAGE 3: COLLECTIONS CENTER
══════════════════════════════════════ */
.coll-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.coll-card{background:var(--a-soft);border:1px solid var(--a-line);border-radius:16px;overflow:hidden;cursor:pointer}
.coll-thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--a-line)}
.coll-thumb-img{width:100%;height:100%;object-fit:cover}
.coll-status-pip{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,1)}
.coll-info{padding:12px}
.coll-name{font-size:14px;font-weight:700;letter-spacing:-.2px}
.coll-sub{font-size:11px;opacity:.5;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coll-plats{display:flex;gap:4px;margin-top:8px}
.plat-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}

/* ══════════════════════════════════════
   PAGE 4: TIMELINE & TEAM BLOCK
══════════════════════════════════════ */
/* Matrix Timeline Grid */
.tl-container{background:var(--a-soft);border:1px solid var(--a-line);border-radius:14px;padding:14px;overflow-x:auto;margin-bottom:24px}
.tl-header-row{display:grid;grid-template-columns:80px repeat(5,1fr);gap:6px;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--a-line)}
.tl-day-lbl{text-align:center;font-size:10px;opacity:.4;line-height:1.2}
.tl-day-lbl.today{opacity:1;color:var(--a-acc);font-weight:700}
.tl-proj-row{display:grid;grid-template-columns:80px repeat(5,1fr);gap:6px;align-items:center;padding:6px 0}
.tl-proj-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-proj-sub{font-family:var(--font-mono);font-size:9px;opacity:.4}
.tl-cells{display:contents}
.tl-cell{height:24px;border-radius:6px;background:var(--a-bg);display:flex;align-items:center;justify-content:center;padding:0 2px;min-width:0;border:1px dashed var(--a-line)}
.tl-cell.sched{background:#E8F0FE;border-style:solid;border-color:#C2D7FA}
.tl-cell.doing{background:#FFF3CD;border-style:solid;border-color:#FFEBAA}
.tl-cell.done{background:#D1E7DD;border-style:solid;border-color:#A3CFBB}
.tl-cell.stuck{background:#F8D7DA;border-style:solid;border-color:#F5C2C7}
.tl-cell-lbl{font-size:8px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;opacity:.8}
.tl-sep{height:1px;background:var(--a-line);opacity:.5}

/* Team Accordion Blocks */
.person-block{background:var(--a-soft);border:1px solid var(--a-line);border-radius:14px;margin-bottom:8px;overflow:hidden}
.person-hdr{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.person-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.person-info{flex:1}
.person-name{font-size:13px;font-weight:700}
.person-role{font-size:10px;opacity:.5;margin-top:1px}
.person-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.person-prog-txt{font-family:var(--font-mono);font-size:10px;font-weight:600;opacity:.6}
.prog-bar-bg{width:60px;height:4px;background:var(--a-line);border-radius:100px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:100px;transition:width .4s ease}

.person-tasks{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.16,1,.3,1);background:rgba(0,0,0,.01)}
.person-tasks.open{max-height:300px;overflow-y:auto;border-top:1px solid var(--a-line)}
.pt-row{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--a-line);font-size:12px}
.pt-row:last-child{border-bottom:none}
.pt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pt-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.pt-sel{background:var(--a-bg);border:1px solid var(--a-line);border-radius:6px;padding:3px 6px;font-size:10px;font-weight:600;color:var(--a-ink);outline:none}

/* ══════════════════════════════════════
   SLIDE-UP SCREEN: COLLECTION DETAIL
══════════════════════════════════════ */
.detail-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--a-bg);z-index:500;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.detail-overlay.open{transform:translateY(0)}
.detail-hdr{padding:16px 20px;border-bottom:1px solid var(--a-line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.detail-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--a-ink)}
.detail-scroll{flex:1;overflow-y:auto;padding:20px}

/* Image Carousel Box */
.carousel-box{position:relative;margin-bottom:20px}
.carousel-inner{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;border-radius:14px;border:1px solid var(--a-line)}
.carousel-inner::-webkit-scrollbar{display:none}
.carousel-slide{flex:0 0 100%;scroll-snap-align:start;aspect-ratio:1.2;display:flex;align-items:center;justify-content:center}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.carousel-placeholder-icon{font-size:40px}
.carousel-placeholder-text{font-size:12px;opacity:.4;font-weight:500}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:8px}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--a-line);transition:background .2s}
.cdot.active{background:var(--a-acc)}

/* Asset Assets Quick Links */
.asset-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.asset-btn{background:var(--a-soft);border:1px solid var(--a-line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--a-ink);font-size:12px;font-weight:600}

/* Mock Feed Preview Tabs */
.plat-tabs{display:flex;background:var(--a-soft);padding:3px;border-radius:8px;margin-bottom:12px;border:1px solid var(--a-line)}
.plat-btn{flex:1;background:none;border:none;padding:6px;font-size:11px;font-weight:700;color:var(--a-ink);opacity:.5;cursor:pointer;border-radius:6px;transition:all .2s}
.plat-btn.active{background:var(--a-bg);opacity:1;box-shadow:0 2px 8px rgba(0,0,0,.04)}

.plat-frame{background:#FFFFFF;border:1px solid var(--a-line);border-radius:12px;overflow:hidden;margin-bottom:20px}
.ig-hdr{padding:10px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700}
.ig-av{width:20px;height:20px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px}
.ig-more{margin-left:auto;opacity:.5}
.ig-actions{padding:10px 10px 4px;font-size:14px;display:flex;gap:12px}
.ig-caption{padding:0 10px 12px;font-size:11px;line-height:1.4}
.shopee-hdr{background:#EE4D2D;padding:10px;color:#fff;font-weight:800;font-size:12px;text-align:center}
.shopee-body{padding:12px;font-size:11px}
.shopee-name{font-weight:700;font-size:13px;margin-bottom:4px}
.shopee-price{color:#EE4D2D;font-weight:700;font-size:16px;margin-bottom:8px;font-family:var(--font-mono)}
.shopee-desc{opacity:.7;line-height:1.4}

/* Copywriting Board Box */
.copy-box{background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:14px;margin-bottom:24px;position:relative}
.copy-lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;opacity:.4;text-transform:uppercase;margin-bottom:6px}
.copy-text{font-size:12px;line-height:1.5;white-space:pre-wrap;color:var(--a-ink)}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--a-bg);border:1px solid var(--a-line);padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer}

/* Linked Steps Tasks inside Details */
.dtask-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--a-line)}
.dtask-row:last-child{border-bottom:none}
.dtask-dot{width:6px;height:6px;border-radius:50%}
.dtask-name{font-size:12px;font-weight:500;flex:1}
.dtask-badge{font-size:9px;padding:2px 6px}

/* Action Execution Bar */
.action-bar{display:flex;gap:10px;margin-top:20px;flex-shrink:0}
.ab-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;text-align:center}
.ab-rev{background:var(--a-soft);color:var(--a-ink);border:1px solid var(--a-line)}
.ab-app{background:var(--a-ink);color:var(--a-bg)}

/* ══════════════════════════════════════
   BOTTOM SHEET: ADD NEW TASK FORM
══════════════════════════════════════ */
.sheet-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:600;opacity:0;pointer-events:none;transition:opacity .3s ease;display:flex;alignment:flex-end;justify-content:center}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet-content{width:100%;max-width:480px;background:var(--a-bg);border-radius:20px 20px 0 0;padding:20px 20px 34px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;gap:14px;margin-top:auto}
.sheet-overlay.open .sheet-content{transform:translateY(0)}
.sheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sheet-title{font-size:16px;font-weight:700;letter-spacing:-.2px}
.sheet-close{background:none;border:none;font-size:18px;cursor:pointer;opacity:.5}

.form-group{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;opacity:.5;text-transform:uppercase}
.form-input{background:var(--a-soft);border:1px solid var(--a-line);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--a-ink);outline:none;font-family:var(--font-sans)}
.form-input:focus{border-color:var(--a-ink)}
.form-row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* Floating Action Trigger Button */
.fab{position:absolute;bottom:84px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--a-ink);color:var(--a-bg);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(0,0,0,.15);border:none;cursor:pointer;z-index:90}

/* ══════════════════════════════════════
   TOAST SYSTEM
══════════════════════════════════════ */
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(0,0,0,.85);color:#fff;padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;z-index:999;opacity:0;pointer-events:none;transition:all .25s cubic-bezier(.16,1,.3,1);white-space:nowrap;backdrop-filter:blur(4px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty State Wrapper */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--a-mid);opacity:.4;text-align:center}
.empty-big{font-size:40px;margin-bottom:8px;display:block}
</style>
</head>
<body class="cc">

<div class="app-container">
  
  <nav class="top-nav">
    <div class="nav-row">
      <div class="nav-left-meta">
        <span class="eyebrow" id="page-eyebrow">อา 17 พ.ค.</span>
        <h1 class="title-main" id="page-title">สรุปงาน</h1>
      </div>
    </div>
    <div class="brand-strip">
      <button class="ent-btn active" data-e="CC" onclick="setEntity('CC')">Chardchakaj</button>
      <button class="ent-btn" data-e="BG" onclick="setEntity('BG')">Boonta Gallery</button>
      <button class="ent-btn" data-e="TR" onclick="setEntity('TR')">Truly</button>
    </div>
  </nav>

  <div class="scroll-viewport" id="scroll">
    
    <div class="page active" id="page-boss">
      <div class="section-hdr"><span class="section-title">📊 สเตตัสภาพรวม</span></div>
      <div class="stat-grid" id="stat-strip"></div>
      <div id="urgent-zone"></div>
    </div>

    <div class="page" id="page-tasks">
      <div class="section-hdr"><span class="section-title">📋 รายการงานค้าง</span></div>

// ════════════════════════════════════════

// ════════════════════════════════════════
function loadDataFromSheets() {
  if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
    fetch(WEB_APP_URL)
      .then(res => res.json())

        if (data && data.tasks && data.tasks.length > 0) {
          tasks = data.tasks;

// ════════════════════════════════════════
// ENTITY + THEME
// ════════════════════════════════════════
let currentEntity = 'CC';

const ENTITY_COLORS = {
  CC: { av:'#0A0A0A', avBg:'#F0F0F0', bar:'#0A0A0A' },
  BG: { av:'#B8860B', avBg:'#1A3328', bar:'#C9A227' },
  TR: { av:'#FFD600', avBg:'#C2185B', bar:'#E91E8C' },
};
const PROJ_ICONS = {'Collection A':'👗','Collection B':'✂️','Collection C':'🎨','จันทบุรี':'📸','Marketing':'📣','Boonta Gallery':'🪟','อื่นๆ':'📎'};
const PROJ_COLORS = {'Collection A':'rgba(233,30,140,.1)','Collection B':'rgba(156,39,176,.1)','Collection C':'rgba(0,188,212,.1)','จันทบุรี':'rgba(52,199,89,.1)','Marketing':'rgba(255,149,0,.1)','Boonta Gallery':'rgba(184,134,11,.1)','อื่นๆ':'rgba(0,0,0,.04)'};

function setEntity(e) {
  currentEntity = e;
  document.body.className = e.toLowerCase();
  document.querySelectorAll('.ent-btn').forEach(b => b.classList.toggle('active', b.dataset.e===e));
  renderAll();
}

// ════════════════════════════════════════
// DATE + UTILS
// ════════════════════════════════════════
const TODAY = new Date();
const TSTR = TODAY.toISOString().slice(0,10);
const DAYS = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
document.getElementById('page-eyebrow').textContent = `${DAYS[TODAY.getDay()]} ${TODAY.getDate()} ${MONTHS[TODAY.getMonth()]}`;

function getWeek() {
  const d=[], m=new Date(TODAY), dow=m.getDay(), diff=dow===0?-6:1-dow;
  m.setDate(m.getDate()+diff);
  for(let i=0;i<5;i++){const x=new Date(m);x.setDate(m.getDate()+i);d.push(x);}
  return d;
}
const WEEK = getWeek();
function fmt(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'});}
function fmtRel(ts){const d=Date.now()-ts;if(d<60000)return'เมื่อกี้';if(d<3600000)return`${Math.floor(d/60000)} นาที`;if(d<86400000)return`${Math.floor(d/3600000)} ชม.`;return`${Math.floor(d/86400000)} วัน`;}
function isOver(t){return t.status!=='done' && t.due < TSTR;}
function per(id){return PEOPLE.find(p=>p.id===id)||{av:'?',role:''};}

function filtered() { return tasks.filter(t => !t.entity || t.entity===currentEntity || currentEntity==='ALL'); }

// ════════════════════════════════════════
// NAV
// ════════════════════════════════════════
const PAGE_NAMES = {boss:'สรุปงาน',tasks:'งานล่าสุด',collections:'Collections',more:'Timeline · ทีม'};
function goTab(name, title, eyebrow, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-eyebrow').textContent = eyebrow==='OPS Dashboard' ? `${DAYS[TODAY.getDay()]} ${TODAY.getDate()} ${MONTHS[TODAY.getMonth()]}` : eyebrow;
  document.getElementById('scroll').scrollTop = 0;
  if(name==='more'){renderTimeline();renderTeam();}
  if(name==='collections')renderCollections();
}

let _sx=0;
document.getElementById('scroll').addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;},{passive:true});
document.getElementById('scroll').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_sx;if(Math.abs(dx)<60)return;
  const pages=['boss','tasks','collections','more'];
  const cur=pages.findIndex(p=>document.getElementById('page-'+p).classList.contains('active'));
  const nxt=dx<0?Math.min(cur+1,3):Math.max(cur-1,0);
  if(nxt!==cur){const tabs=document.querySelectorAll('.tab-item');goTab(pages[nxt],PAGE_NAMES[pages[nxt]],'',tabs[nxt]);}
},{passive:true});

// ════════════════════════════════════════
// RENDER BOSS
// ════════════════════════════════════════
function renderBoss(){
  const ft = filtered();
  const done=ft.filter(t=>t.status==='done').length;
  const doing=ft.filter(t=>t.status==='inprogress').length;
  const stuck=ft.filter(t=>t.status==='blocked'||isOver(t)).length;
  document.getElementById('stat-strip').innerHTML=`
    <div class="stat-card"><div class="stat-n sn-blue">${ft.length}</div><div class="stat-l">ทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-n sn-green">${done}</div><div class="stat-l">เสร็จ</div></div>
    <div class="stat-card"><div class="stat-n sn-orange">${doing}</div><div class="stat-l">กำลังทำ</div></div>
    <div class="stat-card"><div class="stat-n sn-red">${stuck}</div><div class="stat-l">ติดปัญหา</div></div>`;
  const urgents=ft.filter(t=>t.status==='blocked'||isOver(t));
  document.getElementById('urgent-zone').innerHTML=urgents.length===0?'':
    `<div class="alert-strip">
      <span style="font-size:18px;flex-shrink:0">🚨</span>
      <div><div class="alert-title">ต้องติดตามด่วน (${urgents.length})</div>
      ${urgents.map(t=>`<div class="alert-body">· ${t.name} — <strong>${t.person}</strong></div>`).join('')}</div>
    </div>`;
}

// ════════════════════════════════════════
// RENDER TASKS
// ════════════════════════════════════════
function renderTasks(){
  const ft=[...filtered()].filter(t=>t.status!=='done').sort((a,b)=>(b.updated||0)-(a.updated||0));
  const SI={done:{cls:'sb-done',l:'เสร็จ'},inprogress:{cls:'sb-doing',l:'กำลังทำ'},todo:{cls:'sb-todo',l:'รอทำ'},blocked:{cls:'sb-stuck',l:'ติดปัญหา'}};
  document.getElementById('task-list').innerHTML=ft.length===0
    ?`<div class="empty"><span class="empty-big">✓</span>ไม่มีงานค้าง</div>`
    :ft.map(t=>{
      const over=isOver(t);
      const si=over?{cls:'sb-stuck',l:'เกิน'}:SI[t.status]||SI.todo;
      return`<div class="task-row" onclick="cycleStatus(${t.id})">
        <div class="task-icon" style="background:${PROJ_COLORS[t.project]||'rgba(0,0,0,.04)'}">${PROJ_ICONS[t.project]||'📎'}</div>
        <div class="task-main">
          <div class="task-name">${t.name}</div>
          <div class="task-sub">${t.person} · ${t.project} · ${fmtRel(t.updated||0)}</div>
        </div>
        <div class="task-right">
          <div class="task-due ${over?'over':''}">${fmt(t.due)}</div>
          <div class="sbadge ${si.cls}">${si.l}</div>
        </div>
      </div>`;
    }).join('');
}

function cycleStatus(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const c=['todo','inprogress','done','blocked'];
  t.status=c[(c.indexOf(t.status)+1)%c.length];t.updated=Date.now();
  save();renderAll();toast(`→ ${t.status==='done'?'✅ เสร็จ':t.status==='inprogress'?'🟡 กำลังทำ':t.status==='blocked'?'🔴 ติดปัญหา':'📋 รอทำ'}`);
  
  if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
    fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "updateStatus", id: id, status: t.status })
    }).catch(err => console.error(err));
  }
}

const STATUS_DOT = {done:'var(--g-green)',inprogress:'var(--g-orange)',todo:'#C7C7CC',blocked:'var(--g-red)'};

// DETAIL
// ════════════════════════════════════════
let currentColl=null, currentPlatform='ig';
function openDetail(id){
  currentColl=COLLECTIONS.find(c=>c.id===id);if(!currentColl)return;
  currentPlatform='ig';
  document.getElementById('detail-title').textContent=currentColl.name;
  document.getElementById('link-icloud').href=currentColl.icloudLink||'#';
  document.getElementById('link-nas').href=currentColl.nasLink||'#';
  document.querySelectorAll('.plat-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderCarousel();renderPlatformPreview();renderDetailCopy();renderDetailTasks();
  document.getElementById('detail-screen').classList.add('open');
  document.getElementById('detail-screen').querySelector('.detail-scroll').scrollTop=0;
}
function closeDetail(){document.getElementById('detail-screen').classList.remove('open');}

function renderCarousel(){
  const inner=document.getElementById('carousel-inner');
  const dots=document.getElementById('carousel-dots');
  const count=currentColl.images.length||3;
  inner.innerHTML=''; dots.innerHTML='';
  for(let i=0;i<count;i++){
    const slide=document.createElement('div');
    slide.className='carousel-slide';
    if(currentColl.images[i]){
      slide.innerHTML=`<img src="${currentColl.images[i]}" alt="">`;
    } else {
      slide.innerHTML=`<div class="carousel-placeholder" style="background:var(--a-soft)">
        <div class="carousel-placeholder-icon">${currentColl.emoji}</div>
        <div class="carousel-placeholder-text">รูปที่ ${i+1} — เพิ่มจาก iCloud</div>
      </div>`;
    }
    inner.appendChild(slide);
    const dot=document.createElement('div');
    dot.className='cdot'+(i===0?' active':'');
    dots.appendChild(dot);
  }
  inner.addEventListener('scroll',()=>{
    const idx=Math.round(inner.scrollLeft/inner.offsetWidth);
    document.querySelectorAll('.cdot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  },{passive:true});
}

function setPlatform(p,el){
  currentPlatform=p;
  document.querySelectorAll('.plat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderPlatformPreview();renderDetailCopy();
}

function renderPlatformPreview(){
  const c=currentColl;
  const el=document.getElementById('platform-preview');
  const thumbHTML=c.images[0]
    ?`<img src="${c.images[0]}" style="width:100%;aspect-ratio:1;object-fit:cover">`
    :`<div style="width:100%;aspect-ratio:1;background:var(--a-soft);display:flex;align-items:center;justify-content:center;font-size:64px">${c.emoji}</div>`;
  if(currentPlatform==='ig'){
    el.innerHTML=`<div class="plat-frame">
      <div class="ig-hdr">
        <div class="ig-av">T</div>
        <div class="ig-name">truly_official</div>
        <div class="ig-more">···</div>
      </div>
      ${thumbHTML}
      <div class="ig-actions">❤️ 💬 ✈️</div>
      <div class="ig-caption"><strong>truly_official</strong> ${(c.copy.ig||'').slice(0,80)}...</div>
    </div>`;
  } else {
    el.innerHTML=`<div class="plat-frame">
      <div class="shopee-hdr"><div class="shopee-logo">Shopee</div></div>
      ${thumbHTML}
      <div class="shopee-body">
        <div class="shopee-name">${c.name} — ${c.sub}</div>
        <div class="shopee-price">฿XXX</div>
        <div class="shopee-desc">${(c.copy.shopee||'').slice(0,120)}</div>
      </div>
    </div>`;
  }
}

function renderDetailCopy(){
  const text=currentColl.copy[currentPlatform]||'ยังไม่มี copywriting';
  document.getElementById('copy-text-el').textContent=text;
  document.getElementById('copy-platform-lbl').textContent=currentPlatform==='ig'?'IG Caption':'Shopee Description';
}

function copyCopy(){
  navigator.clipboard.writeText(document.getElementById('copy-text-el').textContent)
    .then(()=>toast('📋 Copy แล้ว!'));
}

function renderDetailTasks(){
  const related=tasks.filter(t=>currentColl.name.includes(t.project.slice(0,8))||t.project.includes(currentColl.name.slice(0,8)));
  const SI={done:{cls:'sb-done',l:'เสร็จ',dot:'var(--g-green)'},inprogress:{cls:'sb-doing',l:'กำลังทำ',dot:'var(--g-orange)'},todo:{cls:'sb-todo',l:'รอทำ',dot:'#C7C7CC'},blocked:{cls:'sb-stuck',l:'ติดปัญหา',dot:'var(--g-red)'}};
  document.getElementById('detail-tasks').innerHTML=related.length===0
    ?`<div style="padding:14px;text-align:center;color:var(--a-mid);font-size:13px;opacity:.5">ไม่มีงานที่ link กับ collection นี้</div>`
    :related.map(t=>{const si=SI[t.status]||SI.todo;return`
      <div class="dtask-row">
        <div class="dtask-dot" style="background:${si.dot}"></div>
        <div class="dtask-name">${t.name}</div>
        <div class="dtask-badge sbadge ${si.cls}">${si.l}</div>
      </div>`;}).join('');
}

function approveCollection(){
  if(currentColl){currentColl.status='done';toast('✅ Approved! โพสได้เลย');closeDetail();renderCollections();}
}
function reviseCollection(){
  if(currentColl){currentColl.status='todo';toast('✏️ Revision — แจ้งทีมแล้ว');closeDetail();renderCollections();}
}

// ════════════════════════════════════════
// RENDER TIMELINE
// ════════════════════════════════════════
function renderTimeline(){
  document.getElementById('tl-days').innerHTML=WEEK.map(d=>`
    <div class="tl-day-lbl ${d.toISOString().slice(0,10)===TSTR?'today':''}">
      ${DAYS[d.getDay()]}<br><b>${d.getDate()}</b></div>`).join('');
  const projs=[...new Set(filtered().map(t=>t.project))];
  document.getElementById('tl-body').innerHTML=projs.map(proj=>{
    const pt=filtered().filter(t=>t.project===proj);
    const done=pt.filter(t=>t.status==='done').length;
    const cells=WEEK.map(day=>{
      const ds=day.toISOString().slice(0,10);
      const match=pt.filter(t=>t.due===ds);
      if(!match.length)return`<div class="tl-cell"></div>`;
      const t=match[0];const over=isOver(t);
      const cls=t.status==='done'?'done':over||t.status==='blocked'?'stuck':t.status==='inprogress'?'doing':'sched';
      return`<div class="tl-cell ${cls}"><div class="tl-cell-lbl">${t.name.slice(0,10)}</div></div>`;
    }).join('');
    return`<div class="tl-proj-row">
      <div><div class="tl-proj-name">${proj}</div><div class="tl-proj-sub">${done}/${pt.length}</div></div>
      <div class="tl-cells">${cells}</div>
    </div><div class="tl-sep"></div>`;
  }).join('');
}

// ════════════════════════════════════════
// RENDER TEAM
// ════════════════════════════════════════
function renderTeam(){
  const ec = ENTITY_COLORS[currentEntity]||ENTITY_COLORS.CC;
  document.getElementById('team-list').innerHTML=PEOPLE.map(p=>{
    const pt=filtered().filter(t=>t.person===p.id);
    const done=pt.filter(t=>t.status==='done').length;
    const stuck=pt.filter(t=>t.status==='blocked'||isOver(t)).length;
    const pct=pt.length?Math.round(done/pt.length*100):0;
    const barColor=stuck>0?'var(--g-red)':pct===100&&pt.length>0?'var(--g-green)':ec.bar;
    const rows=pt.length===0
      ?`<div class="pt-row" style="opacity:.4;font-size:13px">ไม่มีงานที่ assign</div>`
      :pt.map(t=>{
        const dot=t.status==='done'?'var(--g-green)':isOver(t)||t.status==='blocked'?'var(--g-red)':t.status==='inprogress'?'var(--g-orange)':'#C7C7CC';
        return`<div class="pt-row">
          <div class="pt-dot" style="background:${dot}"></div>
          <div class="pt-name">${t.name}</div>
          <select class="pt-sel" onchange="upStatus(${t.id},this.value)" onclick="event.stopPropagation()">
            <option value="todo" ${t.status==='todo'?'selected':''}>รอทำ</option>
            <option value="inprogress" ${t.status==='inprogress'?'selected':''}>กำลังทำ</option>
            <option value="done" ${t.status==='done'?'selected':''}>เสร็จ</option>
            <option value="blocked" ${t.status==='blocked'?'selected':''}>ติดปัญหา</option>
          </select>
        </div>`;
      }).join('');
    return`<div class="person-block">
      <div class="person-hdr" onclick="togglePerson('${p.id}')">
        <div class="person-av" style="background:${ec.avBg};color:${ec.av}">${p.av}</div>
        <div class="person-info">
          <div class="person-name">${p.name}</div>
          <div class="person-role">${p.role}</div>
        </div>
        <div class="person-right">
          <div class="person-prog-txt">${done}/${pt.length}</div>
          <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>
      </div>
      <div class="person-tasks" id="pt-${p.id}">${rows}</div>
    </div>`;
  }).join('');
}

function togglePerson(id){document.getElementById('pt-'+id).classList.toggle('open');}
function upStatus(id,val){
  const t=tasks.find(t=>t.id===id);
  if(t){
    t.status=val;t.updated=Date.now();
    save();renderAll();
    
    if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "updateStatus", id: id, status: val })
      }).catch(err => console.error(err));
    }
  }
}

// ════════════════════════════════════════
// SHEET
// ════════════════════════════════════════
function openSheet(){
  document.getElementById('sheet-ovl').classList.add('open');
  document.getElementById('fd').value=TSTR;
  document.getElementById('fent').value=currentEntity;
}
function closeSheet(){document.getElementById('sheet-ovl').classList.remove('open');}
function addTask(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();return;}
  const id = nid++;
  const newTask = {
    id: id,
    name: name,
    project:document.getElementById('fp').value,
    person:document.getElementById('fper').value,
    entity:document.getElementById('fent').value,
    due:document.getElementById('fd').value,
    status:document.getElementById('fs').value,
    updated:Date.now()
  };
  tasks.push(newTask);
  save();closeSheet();document.getElementById('fn').value='';
  renderAll();toast('✅ เพิ่มงานแล้ว');
  
  if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
    fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "addTask", ...newTask })
    }).catch(err => console.error(err));
  }
}

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);
}

// ════════════════════════════════════════
// INIT (เริ่มต้นระบบลุยกับ LINE LIFF)
// ════════════════════════════════════════
function renderAll(){renderBoss();renderTasks();}

// เปิดใช้งานระบบ LINE LIFF และดึงชีตอัตโนมัติเมื่อพร้อม
if (LIFF_ID && LIFF_ID !== "YOUR_LINE_LIFF_ID") {
  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        liff.getProfile().then(profile => {
          toast(`ยินดีต้อนรับคุณ ${profile.displayName} 🚀`);
          loadDataFromSheets();
        });
      }
    })
    .catch(err => {
      console.error("LIFF Init Error:", err);
      loadDataFromSheets();
    });
} else {
  // หากยังไม่ได้ใส่เลขลิฟต์ ให้โหลดข้อมูลหน้าสแตนด์บายจำลองไปก่อน
  renderAll();
}

renderCollections();
</script>
