<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OPS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   RESET + ROOT STYLE
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}

:root{
  --cc-bg:#FAFAFA; --cc-ink:#0A0A0A; --cc-mid:#4A4A4A; --cc-soft:#F0F0F0; --cc-line:#E0E0E0; --cc-acc:#0A0A0A;
  --bg-bg:#F4F7F4; --bg-ink:#1A3328; --bg-mid:#2D6A4F; --bg-soft:#E8F3EC; --bg-line:#C8DDD0; --bg-gold:#B8860B; --bg-acc:#B8860B;
  --tr-bg:#FFFDE7; --tr-ink:#1A1A1A; --tr-mid:#C2185B; --tr-soft:#FCE4EC; --tr-line:#F48FB1; --tr-pink:#E91E8C; --tr-acc:#E91E8C;
  --g-red:#FF3B30; --g-green:#34C759; --g-orange:#FF9500; --g-blue:#007AFF;
  --font-sans:'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-serif:'Playfair Display',serif;
}

.cc{--a-bg:var(--cc-bg);--a-ink:var(--cc-ink);--a-mid:var(--cc-mid);--a-soft:var(--cc-soft);--a-line:var(--cc-line);--a-acc:var(--cc-acc);font-family:var(--font-sans)}
.bg{--a-bg:var(--bg-bg);--a-ink:var(--bg-ink);--a-mid:var(--bg-mid);--a-soft:var(--bg-soft);--a-line:var(--bg-line);--a-acc:var(--bg-acc);font-family:var(--font-sans)}
.tr{--a-bg:var(--tr-bg);--a-ink:var(--tr-ink);--a-mid:var(--tr-mid);--a-soft:var(--tr-soft);--a-line:var(--tr-line);--a-acc:var(--tr-acc);font-family:var(--font-sans)}

body{background:var(--a-bg);color:var(--a-ink);transition:background .4s ease,color .4s ease}
.app-container{max-width:480px;margin:0 auto;height:100%;background:var(--a-bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.03);display:flex;flex-direction:column}

/* Top Navigation */
.top-nav{padding:18px 20px 14px;background:var(--a-bg);border-bottom:1px solid var(--a-line);z-index:100;flex-shrink:0}
.nav-row{display:flex;justify-content:space-between;align-items:flex-end}
.eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;opacity:.5}
.title-main{font-size:24px;font-weight:700;letter-spacing:-.5px}
.bg .title-main{font-family:var(--font-serif);font-weight:700;font-style:italic}
.tr .title-main{text-transform:uppercase;font-style:italic;font-weight:900}

.brand-strip{display:flex;gap:6px;margin-top:14px;overflow-x:auto;padding-bottom:2px}
.brand-strip::-webkit-scrollbar{display:none}
.ent-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid var(--a-line);background:var(--a-soft);color:var(--a-ink);cursor:pointer;white-space:nowrap}
.ent-btn.active{background:var(--a-ink);color:var(--a-bg);border-color:var(--a-ink)}

.scroll-viewport{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:100px}

/* Tabs */
.bottom-tabs{position:absolute;bottom:0;left:0;right:0;height:68px;border-top:1px solid var(--a-line);display:flex;justify-content:space-around;align-items:center;padding-bottom:12px;z-index:100}
.cc .bottom-tabs{background:rgba(250,250,250,.95)}
.bg .bottom-tabs{background:rgba(244,247,244,.95)}
.tr .bottom-tabs{background:rgba(255,253,231,.95)}

.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--a-ink);opacity:.4;cursor:pointer;width:60px}
.tab-item.active{opacity:1;color:var(--a-acc)}
.tab-icon{font-size:18px}
.tab-label{font-size:10px;font-weight:600}

.page{display:none;padding:20px;animation:pageIn .3s ease forwards}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;margin-top:10px}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--a-mid);font-family:var(--font-mono)}

/* Summary & Tasks List UI */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;height:95px}
.stat-n{font-size:32px;font-weight:700;line-height:1;font-family:var(--font-mono)}
.stat-l{font-size:12px;font-weight:500;opacity:.6}

.alert-strip{background:var(--tr-soft);border:1px solid var(--tr-line);border-radius:12px;padding:14px;display:flex;gap:12px;margin-bottom:24px}
.alert-title{font-size:13px;font-weight:700;color:var(--g-red);margin-bottom:4px}
.alert-body{font-size:12px;line-height:1.5;opacity:.8}

.task-row{background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer}
.task-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.task-main{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-sub{font-size:11px;opacity:.5;margin-top:2px}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.task-due{font-family:var(--font-mono);font-size:11px;opacity:.6}
.task-due.over{color:var(--g-red);font-weight:700}

.sbadge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.sb-todo{background:#E5E5EA;color:#8E8E93}
.sb-doing{background:#FFE5CC;color:var(--g-orange)}
.sb-done{background:#E6F9ED;color:var(--g-green)}
.sb-stuck{background:#FFE6E6;color:var(--g-red)}

/* Collections UI */
.coll-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.coll-card{background:var(--a-soft);border:1px solid var(--a-line);border-radius:16px;overflow:hidden;cursor:pointer}
.coll-thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--a-line)}
.coll-status-pip{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%}
.coll-info{padding:12px}
.coll-name{font-size:14px;font-weight:700}
.coll-sub{font-size:11px;opacity:.5;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coll-plats{display:flex;gap:4px;margin-top:8px}
.plat-tag{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}

/* Timeline & Team UI */
.tl-container{background:var(--a-soft);border:1px solid var(--a-line);border-radius:14px;padding:14px;overflow-x:auto;margin-bottom:24px}
.tl-header-row{display:grid;grid-template-columns:80px repeat(5,1fr);gap:6px;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--a-line)}
.tl-day-lbl{text-align:center;font-size:10px;opacity:.4}
.tl-day-lbl.today{opacity:1;color:var(--a-acc);font-weight:700}
.tl-proj-row{display:grid;grid-template-columns:80px repeat(5,1fr);gap:6px;align-items:center;padding:6px 0}
.tl-proj-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-proj-sub{font-family:var(--font-mono);font-size:9px;opacity:.4}
.tl-cells{display:contents}
.tl-cell{height:24px;border-radius:6px;background:var(--a-bg);display:flex;align-items:center;justify-content:center;padding:0 2px;border:1px dashed var(--a-line)}
.tl-cell.sched{background:#E8F0FE;border-style:solid;border-color:#C2D7FA}
.tl-cell.doing{background:#FFF3CD;border-style:solid;border-color:#FFEBAA}
.tl-cell.done{background:#D1E7DD;border-style:solid;border-color:#A3CFBB}
.tl-cell.stuck{background:#F8D7DA;border-style:solid;border-color:#F5C2C7}
.tl-cell-lbl{font-size:8px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.tl-sep{height:1px;background:var(--a-line);opacity:.5}

.person-block{background:var(--a-soft);border:1px solid var(--a-line);border-radius:14px;margin-bottom:8px;overflow:hidden}
.person-hdr{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.person-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.person-info{flex:1}
.person-name{font-size:13px;font-weight:700}
.person-role{font-size:10px;opacity:.5}
.person-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.person-prog-txt{font-family:var(--font-mono);font-size:10px;opacity:.6}
.prog-bar-bg{width:60px;height:4px;background:var(--a-line);border-radius:100px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:100px;transition:width .4s ease}

.person-tasks{max-height:0;overflow:hidden;transition:max-height .3s ease;background:rgba(0,0,0,.01)}
.person-tasks.open{max-height:300px;overflow-y:auto;border-top:1px solid var(--a-line)}
.pt-row{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--a-line);font-size:12px}
.pt-dot{width:6px;height:6px;border-radius:50%}
.pt-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-sel{background:var(--a-bg);border:1px solid var(--a-line);border-radius:6px;padding:3px 6px;font-size:10px;outline:none}

/* Overlays Screen */
.detail-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--a-bg);z-index:500;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.detail-overlay.open{transform:translateY(0)}
.detail-hdr{padding:16px 20px;border-bottom:1px solid var(--a-line);display:flex;justify-content:space-between;align-items:center}
.detail-close{background:none;border:none;font-size:20px;cursor:pointer}
.detail-scroll{flex:1;overflow-y:auto;padding:20px}

.carousel-box{position:relative;margin-bottom:20px}
.carousel-inner{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;border-radius:14px;border:1px solid var(--a-line)}
.carousel-inner::-webkit-scrollbar{display:none}
.carousel-slide{flex:0 0 100%;scroll-snap-align:start;aspect-ratio:1.2;display:flex;align-items:center;justify-content:center}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:8px}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--a-line)}
.cdot.active{background:var(--a-acc)}

.asset-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.asset-btn{background:var(--a-soft);border:1px solid var(--a-line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--a-ink);font-size:12px;font-weight:600}

.plat-tabs{display:flex;background:var(--a-soft);padding:3px;border-radius:8px;margin-bottom:12px;border:1px solid var(--a-line)}
.plat-btn{flex:1;background:none;border:none;padding:6px;font-size:11px;font-weight:700;border-radius:6px;cursor:pointer}
.plat-btn.active{background:var(--a-bg);box-shadow:0 2px 8px rgba(0,0,0,.04)}

.plat-frame{background:#FFFFFF;border:1px solid var(--a-line);border-radius:12px;overflow:hidden;margin-bottom:20px}
.ig-hdr{padding:10px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700}
.ig-av{width:20px;height:20px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px}
.ig-actions{padding:10px 10px 4px;font-size:14px;display:flex;gap:12px}
.ig-caption{padding:0 10px 12px;font-size:11px;line-height:1.4}
.shopee-hdr{background:#EE4D2D;padding:10px;color:#fff;font-weight:800;font-size:12px;text-align:center}
.shopee-body{padding:12px;font-size:11px}
.shopee-name{font-weight:700;font-size:13px}
.shopee-price{color:#EE4D2D;font-weight:700;font-size:16px;margin-bottom:8px}
.shopee-desc{opacity:.7;line-height:1.4}

.copy-box{background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:14px;margin-bottom:24px;position:relative}
.copy-lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;opacity:.4;margin-bottom:6px}
.copy-text{font-size:12px;line-height:1.5;white-space:pre-wrap}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--a-bg);border:1px solid var(--a-line);padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer}

.action-bar{display:flex;gap:10px;margin-top:20px}
.ab-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.ab-rev{background:var(--a-soft);color:var(--a-ink);border:1px solid var(--a-line)}
.ab-app{background:var(--a-ink);color:var(--a-bg)}

.sheet-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:600;opacity:0;pointer-events:none;transition:opacity .3s ease;display:flex;flex-direction:column}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet-content{width:100%;max-width:480px;background:var(--a-bg);border-radius:20px 20px 0 0;padding:20px 20px 34px;transform:translateY(100%);transition:transform .3s ease;margin-top:auto;display:flex;flex-direction:column;gap:14px}
.sheet-overlay.open .sheet-content{transform:translateY(0)}
.sheet-hdr{display:flex;justify-content:space-between;align-items:center}
.sheet-title{font-size:16px;font-weight:700}
.sheet-close{background:none;border:none;font-size:18px;cursor:pointer}

.form-group{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-family:var(--font-mono);font-size:10px;font-weight:700;opacity:.5}
.form-input{background:var(--a-soft);border:1px solid var(--a-line);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--a-ink);outline:none}
.form-row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.fab{position:absolute;bottom:84px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--a-ink);color:var(--a-bg);display:none;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(0,0,0,.15);border:none;cursor:pointer;z-index:90}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(0,0,0,.85);color:#fff;padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:all .25s ease;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--a-mid);opacity:.4}
.empty-big{font-size:40px;margin-bottom:8px}
</style>
</head>
<body class="cc">

<div class="app-container">
  <nav class="top-nav">
    <div class="nav-row">
      <div class="nav-left-meta">
        <span class="eyebrow" id="page-eyebrow">อัปเดตระบบ</span>
        <h1 class="title-main" id="page-title">สรุปงาน</h1>
      </div>
    </div>
    <div class="brand-strip">
      <button class="ent-btn active" data-e="CC" onclick="setEntity('CC')">Chardchakaj</button>
      <button class="ent-btn" data-e="BG" onclick="setEntity('BG')">Boonta Gallery</button>
      <button class="ent-btn" data-e="TR" onclick="setEntity('TR')">Truly</button>
    </div>
  </nav>

  <div class="scroll-viewport" id="scroll">
    <div class="page active" id="page-boss">
      <div class="section-hdr"><span class="section-title">📊 สเตตัสภาพรวม</span></div>
      <div class="stat-grid" id="stat-strip"></div>
      <div id="urgent-zone"></div>
    </div>

    <div class="page" id="page-tasks">
      <div class="section-hdr"><span class="section-title">📋 รายการงานค้าง</span></div>
      <div id="task-list"></div>
    </div>

    <div class="page" id="page-collections">
      <div class="section-hdr"><span class="section-title">👗 คอลเลกชันสินค้า</span></div>
      <div class="coll-grid" id="coll-grid"></div>
    </div>

    <div class="page" id="page-more">
      <div class="section-hdr"><span class="section-title">📅 สัปดาห์นี้ (จ.-ศ.)</span></div>
      <div class="tl-container">
        <div class="tl-header-row" id="tl-days"></div>
        <div id="tl-body"></div>
      </div>
      <div class="section-hdr"><span class="section-title">👥 ความคืบหน้ารายคน</span></div>
      <div id="team-list"></div>
    </div>
  </div>

  <div class="bottom-tabs">
    <button class="tab-item active" onclick="goTab('boss','สรุปงาน','OPS Dashboard',this)">
      <span class="tab-icon">📊</span><span class="tab-label">สรุป</span>
    </button>
    <button class="tab-item" onclick="goTab('tasks','งานล่าสุด','งานที่ต้องทำ',this)">
      <span class="tab-icon">📋</span><span class="tab-label">งานค้าง</span>
    </button>
    <button class="tab-item" onclick="goTab('collections','Collections','แบรนด์เสื้อผ้า',this)">
      <span class="tab-icon">👗</span><span class="tab-label">สินค้า</span>
    </button>
    <button class="tab-item" onclick="goTab('more','Timeline · ทีม','ทรัพยากรบุคคล',this)">
      <span class="tab-icon">👥</span><span class="tab-label">ทีม & แผน</span>
    </button>
  </div>

  <button class="fab" id="admin-fab" onclick="openSheet()">+</button>
</div>

<div class="detail-overlay" id="detail-screen">
  <div class="detail-hdr">
    <h2 class="title-main" id="detail-title" style="font-size:18px">Collection A</h2>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-scroll">
    <div class="carousel-box">
      <div class="carousel-inner" id="carousel-inner"></div>
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>
    <div class="asset-row">
      <a class="asset-btn" id="link-icloud" href="#" target="_blank"><span>☁️</span> iCloud Drive</a>
      <a class="asset-btn" id="link-nas" href="#" target="_blank"><span>💾</span> คลังไฟล์ NAS</a>
    </div>
    <div class="plat-tabs">
      <button class="plat-btn active" onclick="setPlatform('ig',this)">Instagram</button>
      <button class="plat-btn" onclick="setPlatform('shopee',this)">Shopee</button>
    </div>
    <div id="platform-preview"></div>
    <div class="copy-box">
      <div class="copy-lbl" id="copy-platform-lbl">IG Caption</div>
      <div class="copy-text" id="copy-text-el"></div>
      <button class="copy-btn" onclick="copyCopy()">Copy</button>
    </div>
    <div class="section-hdr"><span class="section-title" style="font-size:11px">📍 สเตตัสงานโปรดักชันที่ผูกไว้</span></div>
    <div id="detail-tasks" style="background:var(--a-soft);border:1px solid var(--a-line);border-radius:12px;padding:4px 14px;margin-bottom:20px"></div>
    <div class="action-bar" id="admin-action-bar" style="display:none">
      <button class="ab-btn ab-rev" onclick="reviseCollection()">✏️ สั่งแก้ไขงาน</button>
      <button class="ab-btn ab-app" onclick="approveCollection()">✅ อนุมัติผ่านบรูฟ</button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="sheet-ovl" onclick="closeSheet()">
  <div class="sheet-content" onclick="event.stopPropagation()">
    <div class="sheet-hdr">
      <h3 class="sheet-title">➕ สั่งการ / เพิ่มงานใหม่</h3>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-lbl">ชิ้นงาน / สิ่งที่ต้องทำ</label>
      <input type="text" class="form-input" id="fn" placeholder="เช่น ถ่ายแบบคอล A, ตัดต่อ Teaser">
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-lbl">โปรเจกต์งาน</label>
        <select class="form-input" id="fp">
          <option value="Collection A">👗 Collection A</option>
          <option value="Collection B">✂️ Collection B</option>
          <option value="Collection C">🎨 Collection C</option>
          <option value="จันทบุรี">📸 โปรเจกต์จันทบุรี</option>
          <option value="Marketing">📣 งานการตลาด</option>
          <option value="Boonta Gallery">🪟 Boonta Gallery</option>
          <option value="อื่นๆ">📎 งานอื่นๆ</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-lbl">คนรับผิดชอบ</label>
        <select class="form-input" id="fper">
          <option value="ถั่ว">ถั่ว</option>
          <option value="พี่อาร์ม">พี่อาร์ม</option>
          <option value="พี่จิน">พี่จิน</option>
          <option value="พี่เฟียน">พี่เฟียน</option>
          <option value="พี่พีท">พี่พีท</option>
          <option value="พี่คิวซี">พี่คิวซี</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-lbl">สังกัดค่ายแบรนด์</label>
        <select class="form-input" id="fent">
          <option value="CC">Chardchakaj</option>
          <option value="BG">Boonta Gallery</option>
          <option value="TR">Truly</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-lbl">กำหนดส่งมอบงาน</label>
        <input type="date" class="form-input" id="fd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-lbl">สเตตัสตั้งต้น</label>
      <select class="form-input" id="fs">
        <option value="todo">📋 รอทำ</option>
        <option value="inprogress">🟡 กำลังทำ</option>
        <option value="blocked">🔴 ติดปัญหา</option>
        <option value="done">✅ เสร็จแล้ว</option>
      </select>
    </div>
    <button class="ab-btn ab-app" onclick="addTask()" style="margin-top:10px">💾 บันทึกและซิงค์ข้อมูล</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
// ════════════════════════════════════════
// CONFIGURATION (แก้ลิงก์ Web App กับ LIFF ID ตรงนี้แก)
// ════════════════════════════════════════
const WEB_APP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; 
const LIFF_ID = "YOUR_LINE_LIFF_ID";                       
const ADMIN_RICH_MENU_ID = "YOUR_LINE_ADMIN_RICH_MENU_ID"; 

const ADMIN_IDS = [
  "U123456789abcdef0123456789abcdef0", // <-- วางเลขตัว U ของแกตรงนี้แก
  "Uabcdef0123456789abcdef0123456789"  // <-- วางเลขตัว U ของเจ้านายแกตรงนี้แก
];

let isAdminMode = false;
let tasks = [];

const PEOPLE = [
  {id:'ถั่ว',    av:'ถ', role:'Operate Lead'},
  {id:'พี่อาร์ม',av:'อ', role:'Admin/จัดซื้อ'},
  {id:'พี่จิน', av:'จ', role:'Project Manager'},
  {id:'พี่เฟียน',av:'ฟ', role:'Editor Visual'},
  {id:'พี่พีท', av:'พ', role:'Editor Fashion'},
  {id:'พี่คิวซี',av:'ค', role:'QC เสื้อ'},
];

const COLLECTIONS = [
  {id:'col-a',name:'Collection A',sub:'Thai Mart · TR',emoji:'👗',status:'inprogress',platforms:['ig','shopee'],images:[],icloudLink:'#',nasLink:'#',copy:{ig:'✨ NEW COLLECTION A ✨',shopee:'Collection A — ผ้าคุณภาพดี'}},
  {id:'col-b',name:'Collection B',sub:'รอ brief ครั้งถัดไป',emoji:'✂️',status:'todo',platforms:['ig'],images:[],icloudLink:'#',nasLink:'#',copy:{ig:'ยังไม่มี copywriting',shopee:''}},
  {id:'chan',name:'ถ่ายจันทบุรี',sub:'20–22 พ.ค. 2026 · BG/CC',emoji:'📸',status:'inprogress',platforms:['ig'],images:[],icloudLink:'#',nasLink:'#',copy:{ig:'Behind the scenes จันทบุรี',shopee:''}}
];

const SEED = [
  {id:1,name:'เช็ค status โรงงาน collection A',project:'Collection A',person:'พี่อาร์ม',entity:'TR',due:'2026-05-18',status:'todo',updated:Date.now()},
  {id:2,name:'ส่ง rough cut คลิป collection A',project:'Collection A',person:'พี่เฟียน',entity:'TR',due:'2026-05-20',status:'inprogress',updated:Date.now()},
  {id:3,name:'ตัดคลิป fashion Collection B',project:'Collection B',person:'พี่พีท',entity:'TR',due:'2026-05-21',status:'todo',updated:Date.now()},
  {id:4,name:'QC เสื้อตัวอย่างทุก SKU',project:'Collection A',person:'พี่คิวซี',entity:'TR',due:'2026-05-19',status:'inprogress',updated:Date.now()},
  {id:5,name:'ประสาน location จันทบุรี',project:'จันทบุรี',person:'พี่จิน',entity:'CC',due:'2026-05-18',status:'done',updated:Date.now()}
];
tasks = SEED;

function loadDataFromSheets() {
  if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
    fetch(WEB_APP_URL)
      .then(res => res.json())
      .then(data => {
        if (data && data.tasks && data.tasks.length > 0) {
          tasks = data.tasks;
          renderAll();
        }
      })
      .catch(err => {
        console.error("Fetch error, using SEED:", err);
        renderAll();
      });
  } else {
    renderAll();
  }
}

// ════════════════════════════════════════
// CORE FUNCTIONS
// ════════════════════════════════════════
function renderAll(){renderBoss();renderTasks();if(document.getElementById('page-more').classList.contains('active')){renderTimeline();renderTeam();}}

let currentEntity = 'CC';
const ENTITY_COLORS = { CC: { av:'#0A0A0A', avBg:'#F0F0F0', bar:'#0A0A0A' }, BG: { av:'#B8860B', avBg:'#1A3328', bar:'#C9A227' }, TR: { av:'#FFD600', avBg:'#C2185B', bar:'#E91E8C' }};
const PROJ_ICONS = {'Collection A':'👗','Collection B':'✂️','Collection C':'🎨','จันทบุรี':'📸','Marketing':'📣','Boonta Gallery':'🪟','อื่นๆ':'📎'};
const PROJ_COLORS = {'Collection A':'rgba(233,30,140,.1)','Collection B':'rgba(156,39,176,.1)','Collection C':'rgba(0,188,212,.1)','จันทบุรี':'rgba(52,199,89,.1)','Marketing':'rgba(255,149,0,.1)','Boonta Gallery':'rgba(184,134,11,.1)','อื่นๆ':'rgba(0,0,0,.04)'};

function setEntity(e) {
  currentEntity = e;
  document.body.className = e.toLowerCase();
  document.querySelectorAll('.ent-btn').forEach(b => b.classList.toggle('active', b.dataset.e===e));
  renderAll();
}

const TODAY = new Date();
const TSTR = TODAY.toISOString().slice(0,10);
const DAYS = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function getWeek() {
  const d=[], m=new Date(TODAY), dow=m.getDay(), diff=dow===0?-6:1-dow; m.setDate(m.getDate()+diff);
  for(let i=0;i<5;i++){const x=new Date(m);x.setDate(m.getDate()+i);d.push(x);} return d;
}
const WEEK = getWeek();
function fmt(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'});}
function fmtRel(ts){const d=Date.now()-ts;if(d<60000)return'เมื่อกี้';if(d<3600000)return`${Math.floor(d/60000)} นาที`;if(d<86400000)return`${Math.floor(d/3600000)} ชม.`;return`${Math.floor(d/86400000)} วัน`;}
function isOver(t){return t.status!=='done' && t.due < TSTR;}
function filtered() { return tasks.filter(t => !t.entity || t.entity===currentEntity || currentEntity==='ALL'); }

function goTab(name, title, eyebrow, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  document.getElementById('page-title').textContent = title;
  renderAll();
}

function renderBoss(){
  const ft = filtered();
  const done=ft.filter(t=>t.status==='done').length;
  const doing=ft.filter(t=>t.status==='inprogress').length;
  const stuck=ft.filter(t=>t.status==='blocked'||isOver(t)).length;
  document.getElementById('stat-strip').innerHTML=`
    <div class="stat-card"><div class="stat-n sn-blue">${ft.length}</div><div class="stat-l">ทั้งหมด</div></div>
    <div class="stat-card"><div class="stat-n sn-green">${done}</div><div class="stat-l">เสร็จ</div></div>
    <div class="stat-card"><div class="stat-n sn-orange">${doing}</div><div class="stat-l">กำลังทำ</div></div>
    <div class="stat-card"><div class="stat-n sn-red">${stuck}</div><div class="stat-l">ติดปัญหา</div></div>`;
  const urgents=ft.filter(t=>t.status==='blocked'||isOver(t));
  document.getElementById('urgent-zone').innerHTML=urgents.length===0?'':
    `<div class="alert-strip"><span style="font-size:18px">🚨</span><div><div class="alert-title">ต้องติดตามด่วน (${urgents.length})</div>
      ${urgents.map(t=>`<div class="alert-body">· ${t.name} — <strong>${t.person}</strong></div>`).join('')}</div></div>`;
}

function renderTasks(){
  const ft=[...filtered()].filter(t=>t.status!=='done').sort((a,b)=>(b.updated||0)-(a.updated||0));
  const SI={done:{cls:'sb-done',l:'เสร็จ'},inprogress:{cls:'sb-doing',l:'กำลังทำ'},todo:{cls:'sb-todo',l:'รอทำ'},blocked:{cls:'sb-stuck',l:'ติดปัญหา'}};
  document.getElementById('task-list').innerHTML=ft.length===0
    ?`<div class="empty"><span class="empty-big">✓</span>ไม่มีงานค้าง</div>`
    :ft.map(t=>{
      const over=isOver(t); const si=over?{cls:'sb-stuck',l:'เกิน'}:SI[t.status]||SI.todo;
      const clickAction = isAdminMode ? `onclick="cycleStatus(${t.id})"` : '';
      return`<div class="task-row" ${clickAction}>
        <div class="task-icon" style="background:${PROJ_COLORS[t.project]||'rgba(0,0,0,.04)'}">${PROJ_ICONS[t.project]||'📎'}</div>
        <div class="task-main"><div class="task-name">${t.name}</div><div class="task-sub">${t.person} · ${t.project}</div></div>
        <div class="task-right"><div class="task-due ${over?'over':''}">${fmt(t.due)}</div><div class="sbadge ${si.cls}">${si.l}</div></div>
      </div>`;
    }).join('');
}

function cycleStatus(id){
  if(!isAdminMode) return;
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const c=['todo','inprogress','done','blocked']; t.status=c[(c.indexOf(t.status)+1)%c.length]; t.updated=Date.now();
  renderAll(); toast(`→ อัปเดตงานแล้วแก!`);
  if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
    fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "updateStatus", id: id, status: t.status }) }).catch(e => console.error(e));
  }
}

function renderCollections(){
  document.getElementById('coll-grid').innerHTML=COLLECTIONS.map(c=>`
    <div class="coll-card" onclick="openDetail('${c.id}')">
      <div class="coll-thumb"><span style="font-size:38px">${c.emoji}</span></div>
      <div class="coll-info"><div class="coll-name">${c.name}</div><div class="coll-sub">${c.sub}</div></div>
    </div>`).join('');
}

function openDetail(id){
  currentColl=COLLECTIONS.find(c=>c.id===id); if(!currentColl)return;
  document.getElementById('detail-title').textContent=currentColl.name;
  document.getElementById('copy-text-el').textContent=currentColl.copy.ig;
  document.getElementById('detail-screen').classList.add('open');
}
function closeDetail(){document.getElementById('detail-screen').classList.remove('open');}
function copyCopy(){navigator.clipboard.writeText(document.getElementById('copy-text-el').textContent).then(()=>toast('📋 Copy แล้ว!'));}

function renderTimeline(){
  document.getElementById('tl-days').innerHTML=WEEK.map(d=>`<div class="tl-day-lbl ${d.toISOString().slice(0,10)===TSTR?'today':''}">HTML<br><b>${d.getDate()}</b></div>`).join('');
  const projs=[...new Set(filtered().map(t=>t.project))];
  document.getElementById('tl-body').innerHTML=projs.map(proj=>{
    const pt=filtered().filter(t=>t.project===proj);
    const cells=WEEK.map(day=>{
      const match=pt.filter(t=>t.due===day.toISOString().slice(0,10)); if(!match.length)return`<div class="tl-cell"></div>`;
      return`<div class="tl-cell doing"><div class="tl-cell-lbl">${match[0].name.slice(0,6)}</div></div>`;
    }).join('');
    return`<div class="tl-proj-row"><div class="tl-proj-name">${proj}</div><div class="tl-cells">${cells}</div></div>`;
  }).join('');
}

function renderTeam(){
  document.getElementById('team-list').innerHTML=PEOPLE.map(p=>{
    const pt=filtered().filter(t=>t.person===p.id);
    const rows=pt.length===0?`<div class="pt-row" style="opacity:.4">ไม่มีงานค้าง</div>`:pt.map(t=>`<div class="pt-row"><div class="pt-name">${t.name}</div></div>`).join('');
    return`<div class="person-block"><div class="person-hdr" onclick="togglePerson('${p.id}')"><div class="person-name">${p.name}</div></div><div class="person-tasks" id="pt-${p.id}">${rows}</div></div>`;
  }).join('');
}
function togglePerson(id){document.getElementById('pt-'+id).classList.toggle('open');}

function openSheet(){ if(!isAdminMode) return; document.getElementById('sheet-ovl').classList.add('open'); }
function closeSheet(){document.getElementById('sheet-ovl').classList.remove('open');}

function addTask(){
  if(!isAdminMode) return;
  const name=document.getElementById('fn').value.trim(); if(!name) return;
  const id = Math.max(...tasks.map(t=>t.id), 0) + 1;
  const newTask = { id, name, project:document.getElementById('fp').value, person:document.getElementById('fper').value, entity:document.getElementById('fent').value, due:document.getElementById('fd').value, status:document.getElementById('fs').value, updated:Date.now() };
  tasks.push(newTask); closeSheet(); renderAll(); toast('✅ เพิ่มงานเข้าคลังแล้ว!');
  if (WEB_APP_URL && WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
    fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "addTask", ...newTask }) }).catch(e => console.error(e));
  }
}

// ════════════════════════════════════════
// LINE LIFF ENTRY POINT
// ════════════════════════════════════════
liff.init({ liffId: LIFF_ID })
  .then(() => {
    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      liff.getProfile().then(profile => {
        const uId = profile.userId;
        
        // 🚨 บรรทัดแจ้งรหัสตัว U ของแก ย้ายขึ้นมาอยู่เหนือเงื่อนไขทั้งหมด เด้งชัวร์ล้านเปอร์เซ็นต์แก!
        alert("รหัสตัว U ของแกจ้า คัดลอกเก็บไว้เลยน้า:\n" + uId);
        
        if (ADMIN_IDS.includes(uId)) {
          isAdminMode = true;
          document.getElementById("admin-fab").style.display = "flex";
          document.getElementById("admin-action-bar").style.display = "flex";
          toast(`โหมดแอดมิน: ยินดีต้อนรับคุณ ${profile.displayName} ⚡`);
          if (ADMIN_RICH_MENU_ID && WEB_APP_URL) {
            fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "linkRichMenu", userId: uId, richMenuId: ADMIN_RICH_MENU_ID }) }).catch(e => console.log(e));
          }
        } else {
          isAdminMode = false;
          document.getElementById("admin-fab").style.display = "none";
          document.getElementById("admin-action-bar").style.display = "none";
          toast(`สวัสดีคุณ ${profile.displayName} 👥`);
        }
        loadDataFromSheets();
      });
    }
  })
  .catch(err => {
    console.error("LIFF ล่ม ใช้ระบบจำลองอัตโนมัติ:", err);
    renderAll();
  });

renderCollections();
</script>
</body>
</html>
